{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header fw-bold">Контрагентлар билан қарз-сальдо</div>
  <div class="table-responsive">
    <table class="table table-striped mb-0">
      <thead><tr><th>Компания</th><th>Ҳолат</th><th class="text-end">Нетто, кг</th></tr></thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.company_name }}</td>
          <td>{{ row.status }}</td>
          <td class="text-end">{{ row.net_qty_kg }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
